{% extends "admin/base_site.html" %}
{% block content %}
<h1>Create email from template</h1>
<form method="post">
    {% csrf_token %}
    {{ form }}
    {% for obj in queryset %}
        <input type="hidden" name="{{ action_checkbox_name }}" value="{{ obj.pk }}">
    {% endfor %}
    <input type="hidden" name="action" value="create_email_from_template">
    <p><input type="submit" name="apply" value="Apply" class="button default"></p>
</form>
{% endblock %}

{% extends "admin/base_site.html" %}
{% block content %}
<h1>Review mail ({{ queue_length }} remaining): {{ mail.subject }}</h1>
<p><strong>To:</strong> {{ mail.contact }}</p>

<form method="post" id="review-form">
  {% csrf_token %}
  <div style="display:flex; gap:8px; margin-bottom:16px; align-items:flex-start;">
    <button type="submit" name="action" value="accept" class="button">Accept &amp; send</button>
    <button type="submit" name="action" value="decline" class="button">Decline</button>
    <button type="button" id="toggle-modify" class="button">Modify</button>
    <button type="submit" name="action" value="accept_all" class="button default">Accept all remaining</button>
  </div>

  <div id="modify-section" style="display:none; margin-bottom:16px;">
    <label for="id_body"><strong>Edit HTML body:</strong></label><br>
    <textarea name="body" id="id_body" rows="20" style="width:100%; font-family:monospace; font-size:12px;">{{ mail.body }}</textarea>
    <br>
    <button type="submit" name="action" value="modify" class="button default" style="margin-top:8px;">Save &amp; preview</button>
  </div>
</form>

<div style="border:1px solid #ccc; border-radius:4px; overflow:hidden;">
  <iframe id="preview"
          style="width:100%; height:600px; border:none;"
          ></iframe>
</div>

<script>
(function () {
  const iframe = document.getElementById('preview');
  iframe.srcdoc = `{{ rendered_body|escapejs }}`;
  var btn = document.getElementById('toggle-modify');
  var sec = document.getElementById('modify-section');
  btn.addEventListener('click', function () {
    sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
  });
})();
</script>
{% endblock %}

{% extends "admin/base_site.html" %}
{% block content %}
    <form method="post">
    {% csrf_token %}

    {{ form }}

    {% for obj in queryset %}
        <input type="hidden" name="_selected_action" value="{{ obj.pk }}">
    {% endfor %}

    <input type="hidden" name="action" value="add_tags">

    <button type="submit" name="apply" value="apply">Apply</button>
</form>
{% endblock %}
